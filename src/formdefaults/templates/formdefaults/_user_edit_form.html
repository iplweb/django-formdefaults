{% for override_field, value_field in form.field_pairs %}
<div class="fd-field">
  <span class="fd-override-cell">{{ override_field }}</span>
  <label class="fd-field-body" for="{{ value_field.id_for_label }}">
    <span class="fd-field-label">{{ value_field.label }}</span>
    {{ value_field }}
    {% if value_field.errors %}<div class="fd-errors">{{ value_field.errors }}</div>{% endif %}
  </label>
</div>
{% endfor %}
